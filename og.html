<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#fff;position:relative}
  .glow{position:absolute;width:720px;height:720px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,106,.15),transparent 68%);top:-200px;right:-160px}
  .scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.5) 3px,rgba(0,0,0,.5) 3px);opacity:.32;pointer-events:none}
  .border{position:absolute;inset:24px;border:1px solid rgba(0,255,106,.16);pointer-events:none}
  .wrap{position:relative;display:flex;height:100%;align-items:center;justify-content:space-between;padding:0 74px;gap:40px;z-index:2}
  .txt{max-width:640px}
  .kick{font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:.24em;color:#00ff6a;text-transform:uppercase;margin-bottom:12px}
  .title{font-family:'Fraunces',serif;font-weight:880;font-size:104px;line-height:.9;letter-spacing:-.01em;text-transform:uppercase;
    background:linear-gradient(174deg,#fff 0%,#f3fff8 52%,#9bf0bf 125%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .yr{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.4em;color:#00ff6a;margin-top:10px}
  .name{font-size:27px;font-weight:500;margin-top:24px}
  .name b{color:#00ff6a;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:22px}
  .role{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.1em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:9px}
  .badge{display:inline-flex;align-items:center;gap:9px;margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.14em;color:#00ff6a;border:1px solid rgba(0,255,106,.4);padding:9px 15px;text-transform:uppercase}
  .badge i{width:9px;height:9px;border-radius:50%;background:#00ff6a;box-shadow:0 0 10px #00ff6a;display:inline-block}
  .photo{position:relative;width:300px;height:480px;flex-shrink:0;display:grid;place-items:end center}
  .disc{position:absolute;inset:14% 6% 6%;border-radius:50%;background:radial-gradient(circle at 42% 36%,#17ff80,#06b85a 44%,#026c35 80%,#013b1d);box-shadow:0 0 90px rgba(0,255,106,.4)}
  .photo img{position:relative;z-index:2;height:96%;object-fit:contain;object-position:bottom;filter:drop-shadow(0 14px 30px rgba(0,0,0,.6))}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="border"></div>
  <div class="wrap">
    <div class="txt">
      <div class="kick">Full Stack Developer · Systems Engineer</div>
      <div class="title">Portfolio</div>
      <div class="yr">2026</div>
      <div class="name">Luis David Ibarra Almario <b>· @zoiket00</b></div>
      <div class="role">Cartagena, Colombia · Remote — Global</div>
      <div class="badge"><i></i> Open to work</div>
    </div>
    <div class="photo"><div class="disc"></div><img src="assets/profile.png" alt=""></div>
  </div>
  <div class="scan"></div>
</body>
</html>
